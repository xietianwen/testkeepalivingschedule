name: send-emails-task

on:
  schedule:
    - cron: "*/1 * * * *"
  workflow_dispatch:

jobs:
  sendemails:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Send Emails Task
        run: |
            URLS=(
              https://osaka-docker-dkbbgygna0c2ezg8.westeurope-01.azurewebsites.net/scheduletask/runtask
              https://www.sushi-yummy.fr/scheduletask/runtask
              https://www.bonheur-ruan.fr/scheduletask/runtask
              https://www.totoo.fr/scheduletask/runtask
              https://www.sushiminato.fr/scheduletask/runtask
              https://pontcolbert.aimthai.fr/scheduletask/runtask
              https://www.akira93.fr/scheduletask/runtask
              https://www.kunchapai.eu/scheduletask/runtask
              https://colombes.dancesushi.fr/scheduletask/runtask
              https://puteaux.dancesushi.fr/scheduletask/runtask
              https://www.sushibry.fr/scheduletask/runtask
            )
            
            TASKS=(
              "Nop.Services.Messages.QueuedMessagesSendTask, Nop.Services"
              "Nop.Services.Common.StoreClosedTask, Nop.Services"
            )
            
            for URL in "${URLS[@]}"; do
              for TASK in "${TASKS[@]}"; do
                curl -X POST "$URL" \
                  -H "Content-Type: application/x-www-form-urlencoded" \
                  -d "taskType=$TASK" || true &
              done
            done
            
            wait
