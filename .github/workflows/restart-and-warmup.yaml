name: Restart Selected Azure WebApps + Warmup

on:
  schedule:
    - cron: "0 23 * * *"   # 法国约 01:00
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  restart:
    runs-on: ubuntu-latest

    steps:
      # 🔐 Azure OIDC 登录
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: 0b218d59-75a0-4c88-82cf-61244617419d

      # 🔁 批量重启 + warm-up
      - name: Restart selected web apps
        run: |
          RESOURCE_GROUP="adi-windows-rg-prod-westeu"

          APPS=(
            adiresto-akira
            adiresto-dancesushi-puteaux-docker
            adiresto-sushibry
            adiresto-sushiyummy
            adiresto-toto
            aimthai-core
            bonheur-core
            dancesushi-core
            minato-core
            osaka-docker
            sweetcakeparis-core
          )

          for APP in "${APPS[@]}"; do
            echo "=============================="
            echo "Restarting $APP"
            echo "=============================="

            az webapp restart \
              --name "$APP" \
              --resource-group "$RESOURCE_GROUP" \
              || echo "⚠️ Restart failed for $APP"

            echo "⏳ Waiting 60s for $APP..."
            sleep 60

            echo "🌐 Warm-up $APP"
            curl -L --fail --silent "https://www.${APP#*-}.fr" \
              || echo "⚠️ Warm-up failed for $APP"

            echo ""
          done
