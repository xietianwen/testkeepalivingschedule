name: Restart Selected Azure WebApps + Global Warmup

on:
  schedule:
    - cron: "0 23 * * *"   # 法国约 01:00
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  restart:
    runs-on: ubuntu-latest

    steps:
      # 🔐 Azure OIDC 登录
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: 0b218d59-75a0-4c88-82cf-61244617419d

      # 🔁 Step 1：依次重启（不等待）
      - name: Restart selected web apps (no wait)
        run: |
          RESOURCE_GROUP="adi-windows-rg-prod-westeu"

          APPS=(
            adiresto-akira
            adiresto-dancesushi-puteaux-docker
            adiresto-sushibry
            adiresto-sushiyummy
            adiresto-toto
            aimthai-core
            bonheur-core
            dancesushi-core
            minato-core
            osaka-docker
            sweetcakeparis-core
          )

          for APP in "${APPS[@]}"; do
            echo "🔄 Restarting $APP"
            az webapp restart \
              --name "$APP" \
              --resource-group "$RESOURCE_GROUP" \
              || echo "⚠️ Restart failed for $APP"
          done

      # ⏳ Step 2：统一等待
      - name: Wait for all apps to boot
        run: |
          echo "⏳ Waiting 60 seconds for all apps to start..."
          sleep 60

      # 🌐 Step 3：统一 warm-up 所有官网
      - name: Warm up all websites
        run: |
          URLS=(
            https://www.akira93.fr/sushi-2
            https://puteaux.dancesushi.fr/menus
            https://www.sushibry.fr/special-roll-2
            https://www.sushi-yummy.fr/nos-menus-2
            https://www.totoo.fr/plateaux-2
            https://pontcolbert.aimthai.fr/nos-specialite
            https://www.bonheur-ruan.fr/hors-d-oeuvre
            https://colombes.dancesushi.fr/menus
            https://www.sushiminato.fr/sushi-2
            https://www.osakapoissy.fr/makis-signatures
            https://www.sweetcakeparis.fr/
          )

          for URL in "${URLS[@]}"; do
            echo "🌐 Warming up $URL"
            curl -L --silent --fail "$URL" \
              || echo "⚠️ Warm-up failed for $URL"
          done
