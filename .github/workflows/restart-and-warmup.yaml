name: Stop/Start Selected Azure WebApps + Global Warmup

on:
  schedule:
    - cron: "0 23 * * 0"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  restart:
    runs-on: ubuntu-latest

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: 0b218d59-75a0-4c88-82cf-61244617419d

      # 🛑 Step 1：Stop 所有 WebApps
      - name: Stop selected web apps
        run: |
          RESOURCE_GROUP="adi-windows-rg-prod-westeu"

          APPS=(
            adiresto-akira
            adiresto-dancesushi-puteaux-docker
            adiresto-sushibry
            adiresto-toto
            aimthai-core
            bonbeur-core
            dancesushi-core
            osaka-docker
            sweetcakeparis-core
          )

          for APP in "${APPS[@]}"; do
            echo "🛑 Stopping $APP"
            az webapp stop \
              --name "$APP" \
              --resource-group "$RESOURCE_GROUP" \
              || echo "⚠️ Stop failed for $APP"
          done

      # ⏳ Step 2：等待 30 秒
      - name: Wait 30 seconds
        run: |
          echo "⏳ Waiting 30 seconds..."
          sleep 10

      # ▶️ Step 3：Start 所有 WebApps
      - name: Start selected web apps
        run: |
          RESOURCE_GROUP="adi-windows-rg-prod-westeu"

          APPS=(
            adiresto-akira
            adiresto-dancesushi-puteaux-docker
            adiresto-sushibry
            adiresto-toto
            aimthai-core
            bonbeur-core
            dancesushi-core
            osaka-docker
            sweetcakeparis-core
          )

          for APP in "${APPS[@]}"; do
            echo "▶️ Starting $APP"
            az webapp start \
              --name "$APP" \
              --resource-group "$RESOURCE_GROUP" \
              || echo "⚠️ Start failed for $APP"
          done

      # ⏳ Step 4：等待应用启动
      - name: Wait for apps to boot
        run: |
          echo "⏳ Waiting 60 seconds for boot..."
          sleep 60

      # 🌐 Step 5：Warm-up
      - name: Warm up all websites
        run: |
          URLS=(
            https://www.akira93.fr/sushi-2
            https://puteaux.dancesushi.fr/menus
            https://www.sushibry.fr/special-roll-2
            https://www.sushi-yummy.fr/nos-menus-2
            https://www.totoo.fr/plateaux-2
            https://pontcolbert.aimthai.fr/nos-specialite
            https://www.bonheur-ruan.fr/hors-d-oeuvre
            https://colombes.dancesushi.fr/menus
            https://www.sushiminato.fr/sushi-2
            https://www.osakapoissy.fr/makis-signatures
            https://www.sweetcakeparis.fr/
          )

          echo "🚀 Fire-and-forget warm-up"

          for URL in "${URLS[@]}"; do
            curl -L --silent "$URL" >/dev/null 2>&1 &
          done
